<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小游戏 - 喝水提醒</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="water-icon">💧</span> 喝水提醒
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">个人资料</a></li>
                    <li class="nav-item"><a class="nav-link" href="challenges.html">饮水挑战</a></li>
                    <li class="nav-item"><a class="nav-link" href="knowledge.html">饮水知识</a></li>
                    <li class="nav-item"><a class="nav-link" href="help.html">帮助</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">关于</a></li>
                    <li class="nav-item"><a class="nav-link active" href="game.html"><i class="fas fa-gamepad"></i> 小游戏</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card wide-card">
            <div class="card-body text-center game-panel">
                <h1 class="mb-2">🐱 猫咪跑酷</h1>
                <p class="text-muted mb-3">按空格键/点击画布跳跃，躲避路障。分数越高，解锁越多成就！</p>
                <div class="game-scoreboard mb-2">
                    <div class="game-score-item">当前分数：<strong id="game-score">0</strong></div>
                    <div class="game-score-item">最高分：<strong id="best-score">0</strong></div>
                </div>
                <div class="game-canvas-wrap">
                    <canvas id="runner-canvas" width="900" height="240" class="runner-canvas" aria-label="跑酷游戏画布"></canvas>
                </div>
                <div class="mt-3">
                    <button id="restart-game-btn" class="btn btn-primary">开始游戏</button>
                </div>
                <div class="mt-4 text-start game-achievement-tip">
                    <h5>🎯 游戏成就分数</h5>
                    <ul>
                        <li>100 分：初级跑者</li>
                        <li>300 分：疾速冲刺</li>
                        <li>600 分：极限大师</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
