    <style>
        /* 成就展示优化样式 */
        .achievements-display {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 0;
        }

        .achievement-card {
            display: flex;
            align-items: flex-start;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            border-left: 4px solid #4CAF50;
            position: relative;
            overflow: hidden;
        }

        .achievement-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .achievement-card.challenge {
            border-left-color: #FF9800;
        }

        .achievement-card.game {
            border-left-color: #7E57C2;
        }

        .achievement-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, transparent 70%);
            border-radius: 0 0 0 80px;
        }

        .achievement-card.challenge::before {
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.1) 0%, transparent 70%);
        }

        .achievement-card.game::before {
            background: linear-gradient(135deg, rgba(126, 87, 194, 0.12) 0%, transparent 70%);
        }

        .achievement-icon-wrapper {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4CAF50 0%, #81C784 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-right: 18px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .achievement-card.challenge .achievement-icon-wrapper {
            background: linear-gradient(135deg, #FF9800 0%, #FFB74D 100%);
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }

        .achievement-card.game .achievement-icon-wrapper {
            background: linear-gradient(135deg, #7E57C2 0%, #9575CD 100%);
            box-shadow: 0 4px 12px rgba(126, 87, 194, 0.3);
        }

        .achievement-content {
            flex: 1;
            min-width: 0;
        }

        .achievement-content h5 {
            margin: 0 0 8px 0;
            color: #2c3e50;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .achievement-content p {
            margin: 0 0 12px 0;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .achievement-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .achievement-date {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .achievement-date::before {
            content: '📅';
            font-size: 0.85rem;
        }

        .achievement-type-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .achievement-type-badge.drink {
            background-color: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
        }

        .achievement-type-badge.challenge {
            background-color: rgba(255, 152, 0, 0.15);
            color: #FF9800;
        }

        .achievement-type-badge.game {
            background-color: rgba(126, 87, 194, 0.15);
            color: #7E57C2;
        }

        .empty-achievements {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }

        .empty-achievements-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .achievements-grid {
                grid-template-columns: 1fr;
            }
            
            .achievement-card {
                padding: 16px;
            }
            
            .achievement-icon-wrapper {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>

    <script>
        class ProfileManager {
            constructor() {
                this.userData = this.loadUserData();
                this.init();
            }

            init() {
                this.loadProfile();
                this.loadStatistics();
                this.loadAchievements();
                this.bindEvents();
            }

            loadUserData() {
                const saved = localStorage.getItem('userProfile');
                if (saved) {
                    return JSON.parse(saved);
                }
                return {
                    name: '饮水达人',
                    avatar: '💧',
                    showStats: false,
                    showAchievements: false
                };
            }

            loadProfile() {
                document.getElementById('user-name').textContent = this.userData.name;
                document.getElementById('user-avatar').textContent = this.userData.avatar;
                document.getElementById('profile-name-input').value = this.userData.name;
                document.getElementById('profile-avatar-select').value = this.userData.avatar;
                document.getElementById('show-stats').checked = this.userData.showStats;
                document.getElementById('show-achievements').checked = this.userData.showAchievements;
            }

            loadStatistics() {
                // 从localStorage加载统计数据
                const waterData = JSON.parse(localStorage.getItem('waterReminderData')) || {};
                const today = new Date().toDateString();
                const todayData = waterData[today] || { count: 0 };
                
                // 计算总饮水量
                let totalWater = 0;
                let bestRecord = 0;
                let streakDays = 0;
                let currentStreak = 0;
                let totalDays = 0;
                let goalAchievedDays = 0;
                
                Object.entries(waterData).forEach(([date, data]) => {
                    totalWater += data?.count || 0;
                    totalDays++;
                    if (data?.count > bestRecord) {
                        bestRecord = data.count;
                    }
                    if (data?.count >= 8) { // 假设目标是8杯
                        goalAchievedDays++;
                    }
                });

                // 计算连续天数
                const dates = Object.keys(waterData).sort();
                if (dates.length > 0) {
                    let streak = 0;
                    for (let i = dates.length - 1; i >= 0; i--) {
                        const data = waterData[dates[i]];
                        if (data?.count >= 8) {
                            streak++;
                        } else {
                            break;
                        }
                    }
                    currentStreak = streak;
                }

                // 更新显示
                document.getElementById('total-water').textContent = `${totalWater} 杯`;
                document.getElementById('current-streak').textContent = `${currentStreak} 天`;
                document.getElementById('usage-days').textContent = totalDays;
                document.getElementById('best-record').textContent = `${bestRecord} 杯`;
                document.getElementById('goal-rate').textContent = totalDays > 0 ? 
                    `${Math.round((goalAchievedDays / totalDays) * 100)}%` : '0%';
                document.getElementById('avg-daily').textContent = totalDays > 0 ? 
                    `${Math.round(totalWater / totalDays)} 杯` : '0 杯';

                // 计算等级
                const level = Math.floor(totalWater / 50) + 1;
                document.getElementById('user-level').textContent = level;
            }

            loadAchievements() {
                const container = document.getElementById('achievements-display');
                
                // 立即更新显示，避免一直显示"加载中"
                if (container) {
                    container.innerHTML = '<p class="text-muted">加载成就中...</p>';
                }
                
                try {
                    // 模拟网络延迟，让用户看到加载过程
                    setTimeout(() => {
                        try {
                            // 获取挑战信息的辅助函数
                            const getChallengeInfo = (type) => {
                                const challenges = {
                                    'daily': { icon: '🌅', title: '早起一杯水', description: '每天起床后1小时内喝一杯水' },
                                    'week': { icon: '📅', title: '连续7天', description: '连续7天达到每日饮水目标' },
                                    'weekend': { icon: '🎉', title: '周末达人', description: '周末两天都达到饮水目标' },
                                    'temperature': { icon: '🌡️', title: '温水挑战', description: '全天只喝温水（25-37°C）' },
                                    'lemon': { icon: '🍋', title: '柠檬水日', description: '全天喝柠檬水增加风味' },
                                    'goal-plus': { icon: '🎯', title: '超越目标', description: '一天内喝超过目标2杯水' },
                                    'hourly': { icon: '⏰', title: '每小时一杯', description: '在清醒状态下每小时喝一杯水' },
                                    'morning': { icon: '🌄', title: '早晨达人', description: '上午12点前完成50%的每日目标' }
                                };
                                return challenges[type] || { icon: '🏆', title: '未知挑战', description: '' };
                            };
                            
                            // 加载饮水成就
                            let drinkAchievements = [];
                            try {
                                const drinkData = localStorage.getItem('waterAchievementsData');
                                drinkAchievements = JSON.parse(drinkData || '[]');
                            } catch (e) {
                                console.error('解析饮水成就失败:', e);
                                drinkAchievements = [];
                            }
                            const unlockedDrinkAchievements = Array.isArray(drinkAchievements) ? 
                                drinkAchievements.filter(achievement => achievement.unlocked === true) : [];
                            
                            // 加载挑战成就
                            let completedChallenges = [];
                            try {
                                const challengeData = localStorage.getItem('completedChallenges');
                                completedChallenges = JSON.parse(challengeData || '[]');
                            } catch (e) {
                                console.error('解析挑战成就失败:', e);
                                completedChallenges = [];
                            }
                            const challengeAchievements = Array.isArray(completedChallenges) ? 
                                completedChallenges.map(challengeType => {
                                    const challengeInfo = getChallengeInfo(challengeType);
                                    return {
                                        id: challengeType,
                                        title: challengeInfo.title,
                                        description: challengeInfo.description,
                                        icon: challengeInfo.icon,
                                        date: new Date().toLocaleDateString(),
                                        unlocked: true,
                                        type: 'challenge'
                                    };
                                }) : [];

                            // 加载小游戏成就
                            let gameAchievements = [];
                            try {
                                const gameData = localStorage.getItem('runnerGameAchievementsData');
                                gameAchievements = JSON.parse(gameData || '[]');
                            } catch (e) {
                                console.error('解析小游戏成就失败:', e);
                                gameAchievements = [];
                            }
                            const unlockedGameAchievements = Array.isArray(gameAchievements)
                                ? gameAchievements.filter(achievement => achievement.unlocked === true).map(achievement => ({
                                    ...achievement,
                                    type: 'game'
                                }))
                                : [];
                            // 合并两种成就
                            const allAchievements = [
                                ...unlockedDrinkAchievements.map(achievement => ({
                                    ...achievement,
                                    type: 'drink'
                                })),
                                ...challengeAchievements,
                                ...unlockedGameAchievements
                            ];
                            // 按获得时间排序
                            allAchievements.sort((a, b) => new Date(b.date) - new Date(a.date));
                            const countElement = document.getElementById('achievement-count');
                            
                            if (countElement) {
                                countElement.textContent = allAchievements.length;
                            }
                            
                            if (container) {
                                if (allAchievements.length === 0) {
                                    container.innerHTML = `
                                        <div class="empty-achievements">
                                            <div class="empty-achievements-icon">🏆</div>
                                            <p>您还没有获得任何成就</p>
                                            <small>坚持饮水，解锁更多成就！</small>
                                        </div>
                                    `;
                                    return;
                                }

                                let html = '<div class="achievements-grid">';
                                allAchievements.forEach(achievement => {
                                    const typeClass = achievement.type === 'drink'
                                        ? 'drink'
                                        : achievement.type === 'challenge'
                                            ? 'challenge'
                                            : 'game';
                                    const typeText = achievement.type === 'drink'
                                        ? '饮水成就'
                                        : achievement.type === 'challenge'
                                            ? '挑战成就'
                                            : '游戏成就';
                                    html += `
                                        <div class="achievement-card ${typeClass}">
                                            <div class="achievement-icon-wrapper">${achievement.icon || '🏆'}</div>
                                            <div class="achievement-content">
                                                <h5>${achievement.title || '未命名成就'}</h5>
                                                <p>${achievement.description || '暂无描述'}</p>
                                                <div class="achievement-meta">
                                                    <span class="achievement-date">${achievement.date ? new Date(achievement.date).toLocaleDateString() : '未知'}</span>
                                                    <span class="achievement-type-badge ${typeClass}">${typeText}</span>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                });
                                html += '</div>';
                                container.innerHTML = html;
                            }
                        } catch (error) {
                            console.error('加载成就时出错:', error);
                            if (container) {
                                container.innerHTML = `
                                    <div class="empty-achievements">
                                        <div class="empty-achievements-icon">⚠️</div>
                                        <p>加载成就时出错</p>
                                        <small>请刷新页面重试</small>
                                    </div>
                                `;
                            }
                        }
                    }, 500); // 500ms延迟，模拟加载过程
                } catch (error) {
                    console.error('初始化成就加载时出错:', error);
                    if (container) {
                        container.innerHTML = `
                            <div class="empty-achievements">
                                <div class="empty-achievements-icon">⚠️</div>
                                <p>加载成就时出错</p>
                                <small>请刷新页面重试</small>
                            </div>
                        `;
                    }
                }
            }

            bindEvents() {
                document.getElementById('save-profile').addEventListener('click', () => this.saveProfile());
                document.getElementById('export-all-data').addEventListener('click', () => this.exportAllData());
                document.getElementById('clear-cache').addEventListener('click', () => this.clearCache());
                document.getElementById('delete-account').addEventListener('click', () => this.deleteAccount());
            }

            saveProfile() {
                this.userData.name = document.getElementById('profile-name-input').value;
                this.userData.avatar = document.getElementById('profile-avatar-select').value;
                this.userData.showStats = document.getElementById('show-stats').checked;
                this.userData.showAchievements = document.getElementById('show-achievements').checked;
                
                localStorage.setItem('userProfile', JSON.stringify(this.userData));
                
                document.getElementById('user-name').textContent = this.userData.name;
                document.querySelector('.avatar-large').textContent = this.userData.avatar;
                
                window.AppUI.toast('个人资料已保存！', 'success');
            }

            exportAllData() {
                const data = {
                    userProfile: this.userData,
                    waterData: JSON.parse(localStorage.getItem('waterReminderData')),
                    achievements: JSON.parse(localStorage.getItem('waterAchievementsData')),
                    challenges: JSON.parse(localStorage.getItem('completedChallenges')),
                    gameAchievements: JSON.parse(localStorage.getItem('runnerGameAchievementsData')),
                    exportDate: new Date().toISOString()
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `喝水提醒数据_${new Date().toLocaleDateString()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }

            clearCache() {
                window.AppUI.confirm('确定要清除所有缓存数据吗？这将重置您的所有进度。', () => {
                    localStorage.clear();
                    window.AppUI.toast('缓存已清除！', 'success');
                    location.reload();
                }, '清除');
            }

            deleteAccount() {
                window.AppUI.confirm('确定要删除账户吗？此操作不可恢复！', () => {
                    localStorage.clear();
                    window.AppUI.toast('账户已删除！', 'warning');
                    window.location.href = 'index.html';
                }, '删除');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ProfileManager();
        });
    </script>
</body>
</html>
